name: Release Plugin API

on:
  push:
    tags:
      - 'plugin-api@*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag (e.g. plugin-api@1.2.3 or v1.2.3)"
        required: false

jobs:
  build-and-publish:
    name: Build and Publish to NuGet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: meta
        shell: bash
        run: |
          INPUT_TAG="${{ github.event.inputs.tag }}"
          if [ -n "$INPUT_TAG" ]; then
            REF_NAME="$INPUT_TAG"
          else
            REF_NAME="$GITHUB_REF_NAME"
          fi
          if [[ "$REF_NAME" == *"@"* ]]; then
            VERSION="${REF_NAME#*@}"
          else
            VERSION="${REF_NAME#v}"
          fi
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Restore dependencies
        run: dotnet restore DxWorks.ScriptBee.Plugin.Api/DxWorks.ScriptBee.Plugin.Api.csproj

      - name: Build
        run: >
          dotnet build DxWorks.ScriptBee.Plugin.Api/DxWorks.ScriptBee.Plugin.Api.csproj
          --no-restore
          -c Release
          -p:Version=${{ steps.meta.outputs.version }}

      - name: Pack
        run: >
          dotnet pack DxWorks.ScriptBee.Plugin.Api/DxWorks.ScriptBee.Plugin.Api.csproj
          --no-build
          -c Release
          -p:Version=${{ steps.meta.outputs.version }}
          -o ./nuget-output

      - name: Push to NuGet
        run: >
          dotnet nuget push ./nuget-output/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

  create-release:
    name: Create GitHub Release
    needs: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Extract version from tag
        id: meta
        shell: bash
        run: |
          INPUT_TAG="${{ github.event.inputs.tag }}"
          if [ -n "$INPUT_TAG" ]; then
            REF_NAME="$INPUT_TAG"
          else
            REF_NAME="$GITHUB_REF_NAME"
          fi
          if [[ "$REF_NAME" == *"@"* ]]; then
            VERSION="${REF_NAME#*@}"
          else
            VERSION="${REF_NAME#v}"
          fi
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract changelog for current version
        id: changelog
        run: |
          chmod +x ./scripts/extract_changelog.sh
          ./scripts/extract_changelog.sh "${{ steps.meta.outputs.version }}" DxWorks.ScriptBee.Plugin.Api/CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          body_path: RELEASE_NOTES.md
