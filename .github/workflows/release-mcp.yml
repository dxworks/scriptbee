name: Release MCP

on:
  push:
    tags:
      - 'mcp@*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag (e.g. mcp@1.2.3 or v1.2.3)"
        required: false

jobs:
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ScriptBee.slnx

      - name: Build
        run: dotnet build ScriptBee.slnx --no-restore

      - name: Test
        run: dotnet test ScriptBee.slnx --no-build --verbosity normal

  mcp-build-push:
    name: MCP Build & Push Docker
    needs: backend-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      
      # QEMU is needed to emulate ARM instructions on an x86 runner
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version from tag
        id: meta
        shell: bash
        run: |
          INPUT_TAG="${{ github.event.inputs.tag }}"
          if [ -n "$INPUT_TAG" ]; then
            REF_NAME="$INPUT_TAG"
          else
            REF_NAME="$GITHUB_REF_NAME"
          fi
          if [[ "$REF_NAME" == *"@"* ]]; then
            VERSION="${REF_NAME#*@}"
          else
            VERSION="${REF_NAME#v}"
          fi
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push MCP Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./mcp.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            dxworks/scriptbee-mcp:${{ steps.meta.outputs.version }}
            dxworks/scriptbee-mcp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    needs: build-and-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Extract version from tag
        id: meta
        shell: bash
        run: |
          INPUT_TAG="${{ github.event.inputs.tag }}"
          if [ -n "$INPUT_TAG" ]; then
            REF_NAME="$INPUT_TAG"
          else
            REF_NAME="$GITHUB_REF_NAME"
          fi
          if [[ "$REF_NAME" == *"@"* ]]; then
            VERSION="${REF_NAME#*@}"
          else
            VERSION="${REF_NAME#v}"
          fi
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract changelog for current version
        id: changelog
        run: |
          chmod +x ./scripts/extract_changelog.sh
          ./scripts/extract_changelog.sh "${{ steps.meta.outputs.version }}" Integrations/MCP/CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          body_path: CHANGELOG.md
