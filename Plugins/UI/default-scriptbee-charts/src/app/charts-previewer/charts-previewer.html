@switch (input().type) {
  @case ('bar') {
    <app-bar-chart [theme]="theme()" [input]="input()"></app-bar-chart>
  }
  @case ('bubble') {
    <app-bubble-chart [theme]="theme()" [input]="input()"></app-bubble-chart>
  }
  @case ('tree-map') {
    <app-tree-map [theme]="theme()" [input]="input()"></app-tree-map>
  }
  @case ('scatter-plot') {
    <app-scatter-plot [theme]="theme()" [input]="input()"></app-scatter-plot>
  }
  @case ('heatmap') {
    <app-heatmap-chart [theme]="theme()" [input]="input()"></app-heatmap-chart>
  }
  @case ('gantt') {
    <app-gantt-chart [theme]="theme()" [input]="input()"></app-gantt-chart>
  }
  @default {
    <app-echarts-chart [theme]="theme()" [input]="input()"></app-echarts-chart>
  }
}
