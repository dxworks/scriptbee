<div>Hello, default-scriptbee-chart!</div>

<div>
  Mode: {{ themeService.echartsTheme() }}
  <button (click)="themeService.toggle()">Toggle Mode</button>
</div>

<select [(ngModel)]="selectedChartType">
  <option value="bar">Bar Chart</option>
  <option value="tree-map">Tree Map</option>
  <option value="scatter-plot">Scatter Plot</option>
  <option value="generic-echarts">Generic ECharts</option>
</select>

@switch (selectedChartType()) {
  @case ('bar') {
    <app-bar-chart [parameters]="barChartParameters()"></app-bar-chart>
  }
  @case ('tree-map') {
    <app-tree-map [parameters]="treeMapParameters()"></app-tree-map>
  }
  @case ('scatter-plot') {
    <app-scatter-plot [parameters]="scatterPlotParameters()"></app-scatter-plot>
  }
  @case ('generic-echarts') {
    <app-echarts-chart [parameters]="genericEChartsParameters()"></app-echarts-chart>
  }
  @default {
    <p>Please select a chart type.</p>
  }
}
