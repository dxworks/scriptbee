<div>Hello, default-scriptbee-chart!</div>

<div>
  Mode: {{ themeService.echartsTheme() }}
  <button (click)="themeService.toggle()">Toggle Mode</button>
</div>

<select [(ngModel)]="selectedChartType">
  <option value="bar">Bar Chart</option>
  <option value="tree-map">Tree Map</option>
  <option value="scatter-plot">Scatter Plot</option>
  <option value="heatmap-chart">Heatmap Chart</option>
  <option value="generic-echarts">Generic ECharts</option>
</select>

@switch (selectedChartType()) {
  @case ('bar') {
    <app-charts-previewer [theme]="themeService.echartsTheme()" [content]="barChartParameters()"></app-charts-previewer>
  }
  @case ('tree-map') {
    <app-charts-previewer [theme]="themeService.echartsTheme()" [content]="treeMapParameters()"></app-charts-previewer>
  }
  @case ('scatter-plot') {
    <app-charts-previewer [theme]="themeService.echartsTheme()" [content]="scatterPlotParameters()"></app-charts-previewer>
  }
  @case ('heatmap-chart') {
    <app-charts-previewer [theme]="themeService.echartsTheme()" [content]="heatmapChartParameters()"></app-charts-previewer>
  }
  @case ('generic-echarts') {
    <app-charts-previewer [theme]="themeService.echartsTheme()" [content]="genericEChartsParameters()"></app-charts-previewer>
  }
  @default {
    <p>Please select a chart type.</p>
  }
}
