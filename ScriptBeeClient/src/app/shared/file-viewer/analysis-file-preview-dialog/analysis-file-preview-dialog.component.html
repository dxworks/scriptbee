<h2 mat-dialog-title>Preview: {{ data.file.name }}</h2>
<mat-dialog-content class="preview-dialog-content">
  @if (isLoading()) {
    <app-loading-progress-bar title="Loading File Content..."></app-loading-progress-bar>
  } @else if (errorMessage()) {
    <app-error-state [error]="errorMessage()!" (retry)="loadFileContent()"></app-error-state>
  } @else {
    <div class="viewer-container">
      @if (data.pluginOutlet) {
        <ng-container
          *ngComponentOutlet="data.previewerComponent; inputs: { content: fileContent(), file: data.file, pluginOutlet: data.pluginOutlet }"></ng-container>
      } @else {
        <ng-container *ngComponentOutlet="data.previewerComponent; inputs: { content: fileContent(), file: data.file }"></ng-container>
      }
    </div>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Close</button>
</mat-dialog-actions>
