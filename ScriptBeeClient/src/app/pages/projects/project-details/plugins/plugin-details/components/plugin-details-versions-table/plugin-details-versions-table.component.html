<section class="versions-section">
  <h3 class="mat-title-medium">Version History</h3>
  <table mat-table [dataSource]="sortedVersions()" class="mat-elevation-z0">
    <ng-container matColumnDef="version">
      <th mat-header-cell *matHeaderCellDef>Version</th>
      <td mat-cell *matCellDef="let element">v{{ element.version }}</td>
    </ng-container>

    <ng-container matColumnDef="publishDate">
      <th mat-header-cell *matHeaderCellDef>Published</th>
      <td mat-cell *matCellDef="let element">{{ element.publishDate | date: 'mediumDate' }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let element">
        @if (element.installed) {
          <mat-chip highlighted color="accent" class="small-chip">Installed</mat-chip>
        }
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Action</th>
      <td mat-cell *matCellDef="let element">
        <button
          mat-icon-button
          color="primary"
          [disabled]="element.installed"
          (click)="installVersion.emit(element.version)"
          [matTooltip]="element.installed ? 'Already Installed' : 'Install version ' + element.version">
          <mat-icon>{{ element.installed ? 'check_circle' : 'download' }}</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</section>
