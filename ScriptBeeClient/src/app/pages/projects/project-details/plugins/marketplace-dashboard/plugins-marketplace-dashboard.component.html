<div class="dashboard-header">
  <div class="search-container">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search plugins and bundles</mat-label>
      <input matInput [ngModel]="searchText()" (ngModelChange)="searchText.set($event)" placeholder="E.g. Python, Standard Bundle..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  </div>

  <div class="filter-container">
    <mat-chip-listbox multiple [value]="selectedFilters()" (change)="selectedFilters.set($event.value)">
      <mat-chip-option value="installed">Installed</mat-chip-option>
      <mat-chip-option value="not-installed">Not installed</mat-chip-option>
      <mat-chip-option value="plugins">Plugins</mat-chip-option>
      <mat-chip-option value="bundles">Bundles</mat-chip-option>
    </mat-chip-listbox>
  </div>

  <div class="actions-container">
    <button mat-icon-button color="primary" matTooltip="Install Plugin Manually" [disabled]="uploading()" (click)="fileInput.click()">
      @if (uploading()) {
        <mat-icon>hourglass_empty</mat-icon>
      } @else {
        <mat-icon>upload</mat-icon>
      }
    </button>
    <input #fileInput type="file" style="display: none" (change)="handleFileUpload($event)" accept=".zip" />
  </div>
</div>
<mat-divider></mat-divider>

@if (getAllAvailablePlugins.isLoading()) {
  <app-loading-progress-bar title="Loading marketplace..."></app-loading-progress-bar>
}
@if (installedPlugins.isLoading()) {
  <app-loading-progress-bar title="Loading installed plugins..."></app-loading-progress-bar>
} @else if (getAllAvailablePluginsError()) {
  <div style="margin: 1rem" class="center-column">
    <app-error-state style="width: 400px" [error]="getAllAvailablePluginsError()!" (retry)="getAllAvailablePlugins.reload()"></app-error-state>
  </div>
} @else {
  <div class="dashboard-content">
    <app-plugin-marketplace-dashboard-list
      [plugins]="filteredPlugins()"
      [installedPlugins]="installedPlugins.value() ?? []"
      [projectId]="projectId()"
      (actionCompleted)="onActionCompleted()"></app-plugin-marketplace-dashboard-list>
  </div>
}
