<div class="project-model-section-title project-model-content-after-divider">Load Models</div>

<app-checkable-tree [data]="savedFiles()" (updateCheckedFiles)="onUpdateCheckedFiles($event)"></app-checkable-tree>

@if (isLoadModelsLoading()) {
  <app-centered-spinner text="Loading Models"></app-centered-spinner>
}

<button class="load-button" mat-raised-button [disabled]="checkedFiles().length === 0 || isLoadModelsLoading()" (click)="onLoadFilesClick()">Load Files</button>
