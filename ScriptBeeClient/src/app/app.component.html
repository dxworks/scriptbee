<div style="height: 100%">
  <mat-toolbar>
    @if (shouldDisplayMenuHamburger()) {
      <button matIconButton (click)="onMenuButtonClick()">
        <mat-icon>menu</mat-icon>
      </button>
    }

    <a routerLink="/" style="margin-top: 12px" class="primary-light-background">
      <img src="/images/logo.svg" alt="logo" height="48" width="112" />
    </a>

    <button mat-button routerLink="/projects">Projects</button>
    <button mat-button routerLink="/gateway-plugins">Gateway Plugins</button>

    @if (projectState.currentProjectId()) {
      <button mat-button [routerLink]="'/projects/' + projectState.currentProjectId()">{{ projectState.currentProject()?.name }}</button>
      <span class="flex-spacer"></span>

      <app-instance-manager></app-instance-manager>
    } @else {
      <span class="flex-spacer"></span>
    }

    <mat-slide-toggle [checked]="themeService.darkMode()" (toggleChange)="themeService.toggleDarkMode()" labelPosition="before">
      <mat-icon>bedtime</mat-icon>
    </mat-slide-toggle>
  </mat-toolbar>

  <mat-sidenav-container>
    <mat-sidenav [opened]="shouldDisplayMenuHamburger()" mode="side" [style.width]="sideNavWidth()">
      @if (projectState.currentProjectId()) {
        <app-project-side-nav-list [projectId]="projectState.currentProjectId()!" [isCollapsed]="!isMenuOpen()" />
      }
    </mat-sidenav>

    <mat-sidenav-content [style.margin-left]="sideNavWidth()">
      <router-outlet></router-outlet>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
