<mat-nav-list>
  @for (navItem of navItems(); track navItem) {
    <a mat-list-item [routerLink]="getUrl(navItem)" routerLinkActive #rla="routerLinkActive" [activated]="rla.isActive" class="nav-list-item">
      <mat-icon matListItemIcon>{{ navItem.icon }}</mat-icon>

      @if (!isCollapsed()) {
        <span matListItemTitle> {{ navItem.name }}</span>
      }
    </a>
  }
</mat-nav-list>
